<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="description" content="Helps read the news.">
    <title>headlines.js</title>
    <style>
      html {
        font: medium/normal sans-serif;
        height: 100%;
      }
      body {
        display: grid;
        margin: 0;
        min-height: 100%;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      img {
        vertical-align: middle;
      }
      p {
        text-align: center;
      }
      figcaption {
        font-size: small;
      }
      figure {
        margin: auto;
        max-width: 40rem;
      }
      iframe {
        box-sizing: border-box;
        vertical-align: middle;
      }
      @media all and (max-width: 640px) and (max-height: 360px) {
        figcaption {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <figure>
      <iframe src="widget.html" height="360" width="640"></iframe>
      <figcaption>
        <p><strong><a href="https://github.com/thewhodidthis/headlines">headlines.js</a></strong> Helps read the news</p>
      </figcaption>
    </figure>
  </body>
</html>
