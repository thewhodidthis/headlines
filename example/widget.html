<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta description="HN headlines example">
    <title>hacker news</title>
    <script src="bundle.js" defer></script>
    <style>
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .spinner::before {
        animation: spin 0.6s linear infinite;
        border-radius: 50%;
        border: 2px solid gainsboro;
        border-top-color: gray;
        box-sizing: border-box;
        content: "";
        height: 30px;
        left: 50%;
        margin-left: -15px;
        margin-top: -15px;
        position: absolute;
        top: 50%;
        width: 30px;
      }
    </style>
  </head>

  <body>
    <div class="spinner"></div>
    <just-headlines src="https://cors-anywhere.herokuapp.com/https://news.ycombinator.com/rss"></just-headlines>
    <noscript>need javascript for this thing to work please</noscript>
  </body>
</html>
